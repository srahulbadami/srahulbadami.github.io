<h1>Engineering Blog</h1>

  <div class="card" onclick="openBlog(0)">
    <h3>Stripe Integration</h3>
    <p>Payments, webhooks, reliability</p>

<script>

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

let index = 0;

const blogs = [

`<h2>Stripe Integration — Production Reality</h2>

<p>Payment systems are not simple CRUD flows. They are distributed systems involving external dependencies, retries, and asynchronous state transitions.</p>

<p>The biggest mistake engineers make is trusting synchronous API responses. In reality, Stripe operates asynchronously. Webhooks define the final state.</p>

<div class="code">
intent = stripe.PaymentIntent.create(...)
</div>

<p>We designed the system such that no state is finalized until a webhook confirms it.</p>

<p>Duplicate events forced us to design idempotent systems. Each payment had unique keys ensuring safe re-processing.</p>

<p>Retries were implemented with exponential backoff. Failures were expected, not treated as edge cases.</p>

<p>We also built reconciliation jobs to sync data between Stripe and internal DB.</p>

<p>Final takeaway: payment systems must assume failure at every step.</p>`,

`<h2>Scaling Backend Systems</h2>

<p>Scaling is not about adding servers — it's about removing bottlenecks.</p>

<p>The first bottleneck was database contention. Introducing caching reduced load significantly.</p>

<div class="code">
if(cache.exists(key)){
  return cache.get(key);
}
</div>

<p>We moved heavy operations to async queues, reducing API latency.</p>

<p>Stateless services allowed horizontal scaling across instances.</p>

<p>Monitoring dashboards helped identify latency spikes and throughput limits.</p>

<p>Scaling success came from architecture, not infrastructure.</p>`,

`<h2>Production Failures</h2>

<p>Failures are guaranteed in distributed systems.</p>

<p>Circuit breakers prevented cascading failures.</p>

<p>Retries were controlled to avoid overload.</p>

<p>DLQs ensured failed events were not lost.</p>

<p>Idempotency solved duplicate processing issues.</p>

<p>Lesson: systems must be designed assuming things will break.</p>`

];

function openBlog(i){
  index = i;
  render();
}

function render(){
  document.getElementById("content").innerHTML = blogs[index] + `
  <div class="nav-btns">
    <button onclick="prev()">← Prev</button>
    <button onclick="next()">Next →</button>
  </div>`;
}

function next(){
  index = (index + 1) % blogs.length;
  render();
}

function prev(){
  index = (index - 1 + blogs.length) % blogs.length;
  render();
}

render();

</script>
