<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games Chaos</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Orbitron',sans-serif;background:white;overflow:hidden}
a{text-decoration:none;color:black}

nav{position:fixed;top:0;width:100%;display:flex;justify-content:center;background:rgba(255,255,255,0.8);backdrop-filter:blur(10px)}
.nav-container{width:100%;max-width:1100px;display:flex;justify-content:space-between;padding:16px}
.nav-links{display:flex;gap:14px}
.nav-links a{padding:8px 14px;border-radius:8px}
.nav-links a:hover{background:black;color:white}

h1{text-align:center;margin-top:80px;font-size:70px;animation:glitch 1s infinite}

@keyframes glitch{0%{text-shadow:2px 2px red}50%{text-shadow:-2px -2px blue}100%{text-shadow:2px 2px red}}

.card{width:320px;margin:40px auto;padding:20px;border-radius:16px;background:#f1f5f9;text-align:center;transition:.3s}
.card:hover{transform:rotate(3deg) scale(1.05)}

.loader{position:fixed;width:100%;height:100%;background:white;display:flex;justify-content:center;align-items:center;font-size:30px;z-index:2000}
</style>
</head>
<body>

<div class="loader" id="loader">Loading Chaos...</div>

<nav>
  <div class="nav-container">
    <div>Chaos Lab</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="games.html">Games</a>
    </div>
  </div>
</nav>

<h1>🎮 CHAOS LAB</h1>

<div class="card">
<h3>Experiments</h3>
<p>Games that break expectations.</p>
</div>

<div class="card">
<h3>Coming Soon</h3>
<p>Play Store releases incoming 🚀</p>
</div>

<script>
setTimeout(()=>{document.getElementById('loader').style.display='none'},1500);
</script>

</body>
</html>
