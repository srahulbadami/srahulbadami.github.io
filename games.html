<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:white;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
}

.nav-container{
  max-width:1100px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:16px;
}

.nav-links{
  display:flex;
  gap:14px;
}
.nav-links a{
  color:black;
  text-decoration:none;
  padding:8px 12px;
}

.hamburger{display:none;font-size:24px}

/* MOBILE */
@media(max-width:768px){
  .hamburger{display:block}

  .nav-links{
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    background:white;
    flex-direction:column;
    align-items:center;
    display:none;
  }

  .nav-links.active{display:flex}
}

/* TITLE */
h1{
  text-align:center;
  margin-top:100px;
  font-size:60px;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px red}
  50%{text-shadow:-2px -2px blue}
  100%{text-shadow:2px 2px red}
}

@media(max-width:768px){
  h1{font-size:34px}
}

/* CARDS */
.wrapper{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  width:280px;
  padding:20px;
  border-radius:16px;
  background:#f1f5f9;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05) rotate(2deg);
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:2000;
}
</style>

</head>

<body>

<div class="loader" id="loader">Loading Chaos...</div>

<nav>
  <div class="nav-container">
    <div>Chaos Lab</div>


<div class="nav-links" id="navLinks">
  <a href="index.html">Home</a>
  <a href="work.html">Work</a>
  <a href="games.html">Games</a>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>


  </div>
</nav>

<h1>🎮 CHAOS LAB</h1>

<div class="wrapper">

<div class="card">
<h3>Experimental Games</h3>
<p>Mechanics > Graphics. Breaking norms.</p>
</div>

<div class="card">
<h3>Play Store Incoming</h3>
<p>Publishing soon 🚀</p>
</div>

<div class="card">
<h3>AI + Games</h3>
<p>Procedural chaos, smart systems</p>
</div>

</div>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

setTimeout(()=>{
  document.getElementById('loader').style.display='none'
},1200);
</script>

</body>
</html>
